name: Deployment Workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Build Docker Image
        run: sudo docker build -t my-app-image .

      - name: Make Script Executable
        run: sudo chmod +x deployment.sh # 파일이 현재 폴더에 있다고 가정

      - name: Run Deployment Script
        run: sudo ./deployment.sh my-app-image my-container 8080